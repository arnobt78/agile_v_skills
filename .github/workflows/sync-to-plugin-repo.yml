name: Sync skills to Cursor plugin repo

on:
  push:
    branches: [main]
    paths:
      - '**/SKILL.md'
      - 'agile-v-core/**'
      - 'build-agent/**'
      - 'compliance-auditor/**'
      - 'documentation-agent/**'
      - 'logic-gatekeeper/**'
      - 'red-team-verifier/**'
      - 'requirement-architect/**'
      - 'schematic-generator/**'
      - 'test-designer/**'
      - 'domains/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout skills repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone plugin repo
        env:
          PLUGIN_REPO_TOKEN: ${{ secrets.PLUGIN_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${PLUGIN_REPO_TOKEN}@github.com/Agile-V/agile_v_cursor_plugin.git" plugin-repo
          cd plugin-repo

      - name: Ensure Cursor plugin structure
        working-directory: plugin-repo
        run: |
          mkdir -p .cursor-plugin skills
          cat > .cursor-plugin/plugin.json << 'EOF'
          {
            "name": "agile-v-skills",
            "displayName": "Agile V™ Skills",
            "description": "Agent skills for traceable product development: requirements, build, verification, and compliance following the Agile V™ workflow.",
            "author": { 
              "name": "Agile V™",
              "email": "info@agile-v.org"
            },
            "keywords": ["agile v", "v model", "product development"],
            "license": "CC-BY-SA-4.0"
          }
          EOF
          
          # Validate generated JSON
          jq -e . .cursor-plugin/plugin.json >/dev/null || {
            echo "❌ Invalid JSON in plugin.json"
            cat .cursor-plugin/plugin.json
            exit 1
          }
          echo "✅ plugin.json is valid"

      - name: Copy skill directories into skills/
        working-directory: plugin-repo
        run: |
          # Find all directories containing SKILL.md files
          find .. -mindepth 2 -maxdepth 2 -name SKILL.md -print \
            | sed 's#^../##; s#/SKILL.md$##' \
            | sort \
            > /tmp/agile_v_skill_dirs.txt
          
          echo "📋 Discovered skill directories:"
          cat /tmp/agile_v_skill_dirs.txt
          
          # Copy only validated skill directories
          while IFS= read -r dir; do
            # Skip certain paths even if they contain SKILL.md
            case "$dir" in
              .github/*|docs/*|templates/*|test-*|integrations/*|plugin-repo/*) 
                echo "⏭️  Skipping: $dir"
                continue 
                ;;
            esac
            
            name="$(basename "$dir")"
            echo "📦 Copying: $dir -> skills/$name"
            rm -rf "skills/$name"
            mkdir -p "skills/$name"
            cp -r "../$dir"/* "skills/$name/"
          done < /tmp/agile_v_skill_dirs.txt
          
          echo "✅ Skill copy complete"

      - name: Commit and push to plugin repo
        working-directory: plugin-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || (git commit -m "Sync skills from agile_v_skills@${{ github.sha }}" && git push)